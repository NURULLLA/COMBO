<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>757 Trim Calc</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="757 Trim">
    
    <!-- Chart.js for the Envelope Plot -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation"></script>

    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png"> 
</head>
<body>

    <div class="app-container">
        <header>
            <h1>757 Trim Calculator</h1>
        </header>

        <main>
            <!-- Input Section -->
            <div class="card input-section">
                <h2>Flight Data</h2>
                
                <div class="input-grid-header">
                    <span>Type</span>
                    <span>Weight (kg)</span>
                    <span>Index</span>
                </div>

                <!-- ZFW -->
                <div class="input-row">
                    <span class="label">ZFW</span>
                    <input type="number" id="w_zfw" value="83000" placeholder="kg">
                    <input type="number" id="i_zfw" value="48" placeholder="Idx">
                </div>

                <!-- TOW -->
                <div class="input-row">
                    <span class="label">TOW</span>
                    <input type="number" id="w_tow" value="112916" placeholder="kg">
                    <input type="number" id="i_tow" value="51.9" placeholder="Idx">
                </div>

                <!-- LW -->
                <div class="input-row">
                    <span class="label">LW</span>
                    <input type="number" id="w_lw" value="95000" placeholder="kg">
                    <input type="number" id="i_lw" value="51" placeholder="Idx">
                </div>

                <button id="calc-btn" onclick="calculate()">CALCULATE TRIM</button>
            </div>

            <!-- Results Section -->
            <div id="results-card" class="card results-section hidden">
                <h2>Results</h2>
                <div id="results-content"></div>
            </div>

            <!-- Chart Section -->
            <div class="card chart-section">
                <h2>Envelope</h2>
                <div class="chart-container">
                    <canvas id="envelopeChart"></canvas>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registered'))
                    .catch(err => console.log('Service Worker registration failed', err));
            });
        }
    </script>
</body>
</html>
